{% load static %}
<nav class="bg-white shadow-lg sticky top-0 z-50" role="navigation" aria-label="Main navigation">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center space-x-3">
                <img src="{% static 'images/logo.svg' %}" 
                     alt="Calorie Counter Logo" 
                     class="h-10 w-10">
                <div>
                    <h1 class="text-xl sm:text-2xl font-bold text-gray-800">Calorie Counter</h1>
                    <p class="text-xs text-gray-500 hidden sm:block">Track your daily nutrition</p>
                </div>
            </div>
            
            <div class="hidden md:flex items-center space-x-6">
                <a href="{% url 'index' %}" 
                   class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium transition duration-200">
                    <svg class="inline-block w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    Dashboard
                </a>
                <a href="#add-food-section" 
                   class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium transition duration-200">
                    <svg class="inline-block w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                    </svg>
                    Add Food
                </a>
            </div>
            
            <div class="md:hidden flex items-center">
                <button id="mobile-menu-button" 
                        class="text-gray-600 hover:text-blue-600 focus:outline-none"
                        aria-label="Open menu">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <div id="mobile-menu" class="hidden md:hidden pb-4">
            <a href="{% url 'index' %}" 
               class="block px-4 py-2 text-gray-600 hover:bg-blue-50 rounded-md transition duration-200">
                Dashboard
            </a>
            <a href="#add-food-section" 
               class="block px-4 py-2 text-gray-600 hover:bg-blue-50 rounded-md transition duration-200">
                Add Food
            </a>
        </div>
    </div>
</nav>

<script>
    document.getElementById('mobile-menu-button')?.addEventListener('click', function() {
        const menu = document.getElementById('mobile-menu');
        menu.classList.toggle('hidden');
    });

    document.querySelectorAll('#mobile-menu a').forEach(link => {
        link.addEventListener('click', () => {
            document.getElementById('mobile-menu').classList.add('hidden');
        });
    });
</script>
